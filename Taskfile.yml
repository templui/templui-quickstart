version: "3"

vars:
  # Auto-detect templUI Go module path
  TEMPLUI_PATH:
    sh: go list -m -f {{`'{{.Dir}}'`}} github.com/templui/templui 2>/dev/null || echo ""

  # Auto-detect Tailwind CLI (standalone or npx)
  TAILWIND_CMD:
    sh: command -v tailwindcss >/dev/null 2>&1 && echo "tailwindcss" || echo "npx tailwindcss@latest"

tasks:
  # Development Tools
  templ:
    desc: Run templ with integrated server and hot reload
    cmds:
      - go tool templ generate --watch --proxy="http://localhost:8090" --cmd="go run ." --open-browser=false

  tailwind-clean:
    desc: Clean tailwind output
    cmds:
      - "{{.TAILWIND_CMD}} -i ./assets/css/input.css -o ./assets/css/output.css --clean"

  tailwind-watch:
    desc: Run tailwindcss in watch mode
    cmds:
      - |
        echo "📦 templUI path: {{.TEMPLUI_PATH}}"
        echo "🎨 Tailwind scanning:"
        echo "   - Local templates: ./**/*.templ"
        echo "   - templUI components: {{.TEMPLUI_PATH}}/components/**/*.templ"
        {{.TAILWIND_CMD}} -i ./assets/css/input.css -o ./assets/css/output.css \
          --content "./**/*.templ" \
          --content "{{.TEMPLUI_PATH}}/components/**/*.templ" \
          --watch

  dev:
    desc: Start development server with hot reload
    deps:
      - tailwind-clean
    cmds:
      - task --parallel tailwind-watch templ
